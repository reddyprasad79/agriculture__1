  <button class="menu-btn" id="menuBtn" aria-label="Open Menu">

  </button>

  <ul class="nav-links" id="navLinks">

<section class="auth-page" style="--auth-image:url('images/register-harvest.webp')">
  <a class="auth-logo" href="index.html"><img src="images/stackly-logo.webp" alt="STACKLY Logo"></a>
  <a class="back-home" href="index.html">Back to Home</a>
  <form class="auth-card reveal" id="registerForm">
    <h1>Create Account</h1>
    <input type="text" id="regName" placeholder="Name" pattern="[A-Za-z ]+" required>
    <input type="email" id="regEmail" placeholder="Email ID" required>
    <input type="tel" id="regPhone" placeholder="Phone Number" pattern="[0-9]+" required>
    <input type="password" id="regPassword" placeholder="Password" minlength="6" required>
    <input type="password" id="regConfirm" placeholder="Confirm Password" minlength="6" required>
    <button class="btn btn-gold" type="submit">Create Account</button>
    <p>Already have account? <a href="signin.html">Sign In</a></p>
  </form>
</section>

<script src="script.js"></script>

</body>
